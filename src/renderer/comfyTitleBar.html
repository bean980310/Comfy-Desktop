<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Comfy Desktop — Title Bar</title>
    <!--
      The title bar is the always-alive renderer per host window and now
      hosts the canonical Datadog RUM / PostHog Browser session for that
      window — without it, steady-state ComfyUI sessions (panel torn down)
      would emit zero telemetry. CSP must therefore allow the same
      Datadog + PostHog endpoints as the panel renderer.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.posthog.com; font-src 'self' data:; connect-src 'self' ws: https://*.datadoghq.com https://browser-intake-us5-datadoghq.com https://*.posthog.com"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/comfyTitleBar/main.ts"></script>
  </body>
</html>
