<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Comfy Desktop — Title Popup</title>
    <!--
      The title-bar dropdown popup runs in a transparent frameless child
      WebContentsView with no telemetry surfaces. CSP can stay narrow —
      only the bundled JS, design-token CSS, and Inter font are needed.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws:"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/comfyTitlePopup/main.ts"></script>
  </body>
</html>
