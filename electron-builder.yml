appId: org.comfy.comfyui-desktop-2
productName: ComfyUI Desktop 2.0
directories:
  buildResources: resources
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!eslint.config.ts'
  - '!{.eslintcache,.prettierrc.json,README.md,DESIGN_PROCESS.md,MANAGER_RESTART.md,REFERENCE_COMFY_DESKTOP.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.env,.env.*,.npmrc}'
  - '!docs/*'
  - '!out/**/*.map'
  - '!reference/*'
extraResources:
  - from: lib
    to: lib
asarUnpack:
  - node_modules/7zip-bin/**/*
afterPack: ./scripts/afterPack.mjs
publish:
  provider: github
  owner: Comfy-Org
  repo: ComfyUI-Desktop-2.0-Beta
artifactName: ComfyUI-Desktop-2.0-${version}-${os}-${arch}.${ext}
win:
  target: nsis
  icon: assets/Comfy_Logo_x256.png
  extraResources:
    - from: bootstrap-python/win-x64
      to: bootstrap-python
      filter:
        - '**/*'
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  include: scripts/installer.nsh
mac:
  target:
    - dmg
    - zip
  icon: assets/Comfy_Logo_x512.png
  category: public.app-category.developer-tools
  extraResources:
    - from: bootstrap-python/mac-arm64
      to: bootstrap-python
      filter:
        - '**/*'
linux:
  target:
    - AppImage
    - deb
  icon: assets/Comfy_Logo_x256.png
  category: Development
  extraResources:
    - from: resources/apparmor-profile
      to: apparmor-profile
    - from: bootstrap-python/linux-x64
      to: bootstrap-python
      filter:
        - '**/*'
deb:
  afterInstall: scripts/after-install.sh
  afterRemove: scripts/after-remove.sh
